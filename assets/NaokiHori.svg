  <style>
    * {
      font-family: "Courier New";
    }
    <!-- stroke-width is not give here since it is used to decide svg size -->
    rect.border {
      stroke: #888888;
      fill: #ffffff;
    }
    rect.topic {
      stroke-width: 2.5;
      fill: #444444;
    }
    rect.lang {
      stroke-width: 2.5;
      fill: #ffffff;
    }
    text {
      dominant-baseline: middle;
      font-size: medium;
      font-weight: normal;
    }
    text.title {
      font-size: large;
      font-weight: bold;
      fill: #2f80ed;
    }
    text.descr {
      fill: #000000;
    }
    text.topic {
      fill: #ffffff;
    }
    path.star {
      stroke: #000000;
      stroke-width: 2;
      fill: #ffff00;
    }
  </style>

  <rect
